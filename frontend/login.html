{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - LYDO Youth Profiling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light login-page">
    <div class="container vh-100 d-flex align-items-center justify-content-center flex-column">
        <div class="card shadow-sm w-100 login-card two-column" style="max-width:540px;">
            <div class="left-panel">
                <div class="login-logo">
                    <img src="{% static 'images/logo.png' %}" alt="LYDO Logo">
                </div>
                <h2>LYDO Youth Profiling System</h2>
                <p>Local Youth Development Office - Manolo Fortich, Bukidnon</p>
            </div>
            <div class="right-panel">
                <div class="form-header">
                    <h5 class="mb-0">Welcome Back</h5>
                    <div class="form-subtitle">Please sign in to access the youth profiling dashboard</div>
                </div>
                <div class="card-body">
                    <form onsubmit="handleAuth(event)">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="auth-username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="auth-password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In to Dashboard</button>
                    </form>
                </div>
                <div class="card-footer text-muted small">&nbsp;</div>
            </div>
        </div>
    </div>

    <script src="{% static 'script.js' %}"></script>
</body>
</html>
